<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photos · Martin Hodde</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css?v=4">
  <style>
    .photo-grid {
      columns: 3 280px;
      column-gap: 0.75rem;
      padding: 0.5rem 0 2rem;
    }
    .photo-grid img {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 0.75rem;
      border-radius: 4px;
      break-inside: avoid;
      cursor: zoom-in;
      transition: opacity 0.2s;
    }
    .photo-grid img:hover { opacity: 0.88; }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 4px;
      object-fit: contain;
      cursor: default;
    }
    #lightbox-prev, #lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #c0caf5;
      font-size: 2rem;
      cursor: pointer;
      padding: 1rem;
      opacity: 0.5;
      transition: opacity 0.15s;
      user-select: none;
    }
    #lightbox-prev:hover, #lightbox-next:hover { opacity: 1; }
    #lightbox-prev { left: 1rem; }
    #lightbox-next { right: 1rem; }
    #lightbox-close {
      position: fixed;
      top: max(0.5rem, env(safe-area-inset-top));
      right: 0.5rem;
      background: none;
      border: none;
      color: #c0caf5;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.75rem 1rem;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    #lightbox-close:hover { opacity: 1; }
  </style>
  <script src="/js/nav.js" defer></script>
</head>
<body>

  <main class="container">
    <div class="page-header">
      <h1>photos</h1>
      <p>Miscellaneous travel and adventure photos, shot by me. Refresh page to shuffle order.</p>
    </div>
    <div class="photo-grid" id="photo-grid"></div>
  </main>

  <div id="lightbox">
    <button id="lightbox-close">✕</button>
    <button id="lightbox-prev">&#8249;</button>
    <img id="lightbox-img" src="" alt="">
    <button id="lightbox-next">&#8250;</button>
  </div>

  <footer>
    <div class="container">
      <span>martinhodde.com</span>
      <span class="footer-sep">───── ✦ ─────</span>
      <span>// hosted from the closet</span>
    </div>
  </footer>

  <script src="/js/photos.js"></script>
</body>
</html>
